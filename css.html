<style>
* {
  box-sizing: border-box;
}

:root {
  --bg: #f3f6f9;
  --panel: #ffffff;
  --panel-soft: #f8fafc;
  --line: #dbe5ef;
  --line-soft: #edf2f7;
  --text: #05233f;
  --muted: #60758a;
  --primary: #183856;
  --primary-hover: #10283f;
  --accent: #138575;
  --accent-hover: #0f6f62;
  --accent-soft: #e9faf6;
  --danger: #dc2626;
  --success-bg: #e9fbf3;
  --success-text: #087a52;
  --error-bg: #fff1f2;
  --error-text: #be123c;
  --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  --radius: 18px;
}

html,
body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  font-size: 14px;
}

body {
  overflow-x: hidden;
}

button,
input,
select {
  font-family: inherit;
}

button {
  border: 0;
  border-radius: 9px;
  padding: 11px 14px;
  background: var(--primary);
  color: #ffffff;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
}

button:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
}

button.primary {
  background: var(--accent);
}

button.primary:hover {
  background: var(--accent-hover);
}

button.small {
  padding: 8px 10px;
  font-size: 12px;
}

input,
select {
  width: 100%;
  height: 38px;
  border: 1px solid #cbd8e5;
  border-radius: 8px;
  padding: 0 11px;
  background: #ffffff;
  color: var(--text);
  font-size: 13px;
  outline: none;
}

input:focus,
select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(19, 133, 117, 0.12);
}

label {
  display: block;
  margin: 12px 0 6px;
  color: var(--text);
  font-size: 12px;
  font-weight: 800;
}

.hidden {
  display: none !important;
}

.app {
  width: 100%;
  min-height: 100vh;
}

.layout {
  display: grid;
  grid-template-columns: 330px minmax(0, 1fr);
  gap: 22px;
  width: 100%;
  max-width: 1600px;
  margin: 0 auto;
  padding: 24px;
}

.sidebar {
  position: sticky;
  top: 20px;
  align-self: start;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  padding-right: 2px;
}

.sidebar::-webkit-scrollbar {
  width: 6px;
}

.sidebar::-webkit-scrollbar-thumb {
  background: #cbd8e5;
  border-radius: 999px;
}

.sidebar-header {
  margin-bottom: 14px;
}

.sidebar-header h1 {
  margin: 0 0 5px;
  color: var(--text);
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.5px;
}

.sidebar-header p {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.status {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  min-height: 34px;
  margin: 14px 0 0;
  padding: 8px 12px;
  border-radius: 999px;
  background: #eef4fa;
  color: var(--primary);
  font-size: 12px;
  font-weight: 800;
  line-height: 1.3;
  word-break: keep-all;
}

.status.success {
  background: var(--success-bg);
  color: var(--success-text);
}

.status.error {
  background: var(--error-bg);
  color: var(--error-text);
}

.side-card {
  margin-bottom: 14px;
  padding: 15px;
  border-radius: var(--radius);
  background: var(--panel);
  box-shadow: var(--shadow);
}

.side-card h2 {
  margin: 0 0 4px;
  color: var(--text);
  font-size: 16px;
  font-weight: 900;
}

.side-card p {
  margin: 0 0 12px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.side-card details {
  margin: 0;
}

.side-card summary {
  list-style: none;
  cursor: pointer;
}

.side-card summary::-webkit-details-marker {
  display: none;
}

.side-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin: -2px 0 10px;
}

.side-summary h2 {
  margin: 0;
}

.side-summary span {
  flex: 0 0 auto;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

details[open] .side-summary span {
  color: var(--accent);
}

.button-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}

.button-grid.two {
  grid-template-columns: 1fr 1fr;
}

.button-grid.three {
  grid-template-columns: 1fr 1fr 1fr;
}

.form-block {
  margin-top: 12px;
}

.form-block:first-child {
  margin-top: 0;
}

.guide-box {
  display: grid;
  gap: 4px;
  margin-top: 12px;
  padding: 11px;
  border-radius: 12px;
  background: var(--accent-soft);
  color: var(--text);
  font-size: 12px;
  line-height: 1.45;
}

.guide-box strong {
  font-weight: 900;
}

.guide-box span {
  color: #1f4f5e;
}

.main {
  min-width: 0;
}

.main-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 16px;
}

.main-header h1 {
  margin: 0 0 5px;
  color: var(--text);
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.4px;
}

.main-header p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.summary-card {
  min-height: 90px;
  padding: 16px;
  border-radius: var(--radius);
  background: var(--panel);
  box-shadow: var(--shadow);
}

.summary-label {
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.summary-value {
  color: var(--text);
  font-size: 27px;
  font-weight: 950;
  letter-spacing: -0.5px;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 16px;
}

.result-panel {
  width: 100%;
  padding: 20px;
  border-radius: var(--radius);
  background: var(--panel);
  box-shadow: var(--shadow);
}

.result-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}

.result-header h2 {
  margin: 0 0 5px;
  color: var(--text);
  font-size: 20px;
  font-weight: 950;
  letter-spacing: -0.3px;
}

.result-header p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
}

.result-actions {
  display: flex;
  gap: 8px;
  flex: 0 0 auto;
}

.chart-content {
  width: 100%;
  min-height: 120px;
}

.chart-content svg {
  display: block;
  width: 100%;
  max-width: 100%;
}

.chart-row {
  display: grid;
  grid-template-columns: 160px minmax(0, 1fr) 70px;
  align-items: center;
  gap: 14px;
  margin: 12px 0;
}

.chart-label {
  color: var(--text);
  font-size: 13px;
  font-weight: 800;
  word-break: keep-all;
}

.chart-label.wide {
  min-width: 210px;
}

.chart-bar-wrap {
  height: 24px;
  border-radius: 999px;
  background: #e6eef6;
  overflow: hidden;
}

.chart-bar {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #0f766e, #16c7b7);
}

.chart-value {
  text-align: right;
  color: var(--text);
  font-size: 13px;
  font-weight: 900;
}

.chart-note {
  margin: 16px 0 0;
  padding-top: 12px;
  border-top: 1px solid var(--line-soft);
  color: #415b73;
  font-size: 12px;
  line-height: 1.65;
}

.line-chart-wrapper {
  padding-top: 4px;
}

.line-chart-legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 12px;
  color: var(--text);
  font-size: 13px;
  font-weight: 800;
}

.line-chart-summary {
  margin-top: 12px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

.table-wrap {
  width: 100%;
  overflow-x: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
}

table {
  width: 100%;
  min-width: 760px;
  border-collapse: collapse;
  background: #ffffff;
}

th,
td {
  padding: 12px 13px;
  border-bottom: 1px solid var(--line-soft);
  border-right: 1px solid var(--line-soft);
  text-align: left;
  white-space: nowrap;
  font-size: 13px;
}

th:last-child,
td:last-child {
  border-right: 0;
}

tr:last-child td {
  border-bottom: 0;
}

th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #eef4fa;
  color: var(--text);
  font-weight: 900;
}

td {
  color: #12324f;
}

.result-top-summary-box {
  margin: 10px 0 14px;
}

.result-summary-table {
  min-width: 0;
  width: auto;
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
}

.result-summary-table th,
.result-summary-table td {
  padding: 9px 12px;
  font-size: 12px;
}

.result-summary-table th {
  position: static;
  width: 180px;
  background: #eef4fa;
}

.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  background: rgba(248, 250, 252, 0.72);
  backdrop-filter: blur(4px);
}

body.loading .loading-overlay {
  display: flex;
}

.loader {
  width: 42px;
  height: 42px;
  border: 4px solid #dbe5ef;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.loading-overlay p {
  margin: 0;
  color: var(--text);
  font-size: 14px;
  font-weight: 900;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

@media (max-width: 1280px) {
  .layout {
    grid-template-columns: 300px minmax(0, 1fr);
    padding: 18px;
  }

  .summary-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 960px) {
  .layout {
    display: block;
  }

  .sidebar {
    position: static;
    max-height: none;
    margin-bottom: 16px;
    padding-right: 0;
  }

  .summary-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .main-header {
    display: block;
  }

  .result-header {
    display: block;
  }

  .result-actions {
    margin-top: 12px;
  }
}

@media (max-width: 560px) {
  .layout {
    padding: 12px;
  }

  .summary-grid {
    grid-template-columns: 1fr;
  }

  .button-grid.two,
  .button-grid.three {
    grid-template-columns: 1fr;
  }

  .chart-row {
    grid-template-columns: 1fr;
    gap: 6px;
  }

  .chart-value {
    text-align: left;
  }
}
</style>
